[org/gnome/desktop/app-folders]
folder-children=['System', 'Utilities', 'YaST', 'Pardus']

[org/gnome/desktop/app-folders/folders/Pardus]
categories=['X-Pardus-Apps']
name='X-Pardus-Apps.directory'
translate=true

[org/gnome/desktop/app-folders/folders/System]
apps=['org.gnome.baobab.desktop', 'org.gnome.DiskUtility.desktop', 'org.gnome.Logs.desktop', 'org.gnome.SystemMonitor.desktop', 'org.gnome.tweaks.desktop']
name='X-GNOME-Shell-System.directory'
translate=true

[org/gnome/desktop/app-folders/folders/Utilities]
apps=['org.gnome.Decibels.desktop', 'org.gnome.Connections.desktop', 'org.gnome.Papers.desktop', 'org.gnome.font-viewer.desktop', 'org.gnome.Loupe.desktop']
name='X-GNOME-Shell-Utilities.directory'
translate=true

[org/gnome/desktop/app-folders/folders/YaST]
categories=['X-SuSE-YaST']
name='suse-yast.directory'
translate=true

[org/gnome/desktop/background]
picture-options='zoom'
picture-uri='file:///run/current-system/sw/share/diesel-os-lab/wallpaper.jpg'
picture-uri-dark='file:///run/current-system/sw/share/diesel-os-lab/wallpaper.jpg'

[org/gnome/desktop/input-sources]
sources=[('xkb', 'br')]
xkb-options=@as []

[org/gnome/desktop/interface]
color-scheme='prefer-dark'
cursor-theme='Adwaita'
enable-animations=false
gtk-theme='Adwaita-dark'
icon-theme='Fluent-dark'

[org/gnome/desktop/notifications]
application-children=['firefox', 'org-gnome-console']

[org/gnome/desktop/notifications/application/firefox]
application-id='firefox.desktop'

[org/gnome/desktop/notifications/application/org-gnome-console]
application-id='org.gnome.Console.desktop'

[org/gnome/desktop/peripherals/keyboard]
numlock-state=true

[org/gnome/desktop/screensaver]
picture-options='zoom'
picture-uri='file:///run/current-system/sw/share/diesel-os-lab/wallpaper.jpg'

[org/gnome/desktop/wm/preferences]
button-layout=':minimize,maximize,close'

[org/gnome/evolution-data-server]
migrated=true

[org/gnome/mutter]
experimental-features=['scale-monitor-framebuffer']

[org/gnome/settings-daemon/plugins/power]
sleep-inactive-ac-type='nothing'

[org/gnome/shell]
disable-user-extensions=false
enabled-extensions=['dash-to-dock@micxgx.gmail.com', 'caffeine@patapon.info']
favorite-apps=['firefox.desktop', 'org.gnome.Nautilus.desktop', 'steam.desktop', 'bitwarden.desktop', 'onlyoffice-desktopeditors.desktop', 'org.gnome.Software.desktop', 'org.gnome.Console.desktop']
welcome-dialog-last-shown-version='49.2'

[org/gnome/shell/extensions/caffeine]
indicator-position-max=1

[org/gnome/shell/extensions/dash-to-dock]
animation-time=0.14999999999999999
autohide=true
autohide-in-fullscreen=true
background-opacity=0.75
click-action='minimize'
dash-max-icon-size=40
disable-overview-on-startup=true
dock-fixed=false
dock-position='BOTTOM'
extend-height=false
hide-delay=0.0
intellihide=true
isolate-workspaces=false
pressure-threshold=0.0
require-pressure-to-show=false
scroll-action='cycle-windows'
show-delay=0.0
show-mounts=false
show-trash=false
transparency-mode='FIXED'

[org/gnome/software]
check-timestamp=int64 1775425814
first-run=false

[org/virt-manager/virt-manager/connections]
autoconnect=['qemu:///system']
uris=['qemu:///system']
